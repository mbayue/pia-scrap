name: Build zip artifacts

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-web.txt -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ web/ gui/ main.py

      - name: Run ruff format check
        run: ruff format --check src/ tests/ web/ gui/ main.py

  build:
    name: Build ${{ matrix.name }} zip
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            executable: pia-scrap
            spec: pia-scrap.spec
            requirements: requirements.txt
          - name: windows
            os: windows-latest
            executable: pia-scrap.exe
            spec: pia-scrap.spec
            requirements: requirements.txt
          - name: gui-linux
            os: ubuntu-22.04
            executable: pia-scrap-gui
            spec: pia-scrap-gui.spec
            requirements: requirements-gui.txt
            python-version: "3.10"
          - name: gui-windows
            os: windows-latest
            executable: pia-scrap-gui.exe
            spec: pia-scrap-gui.spec
            requirements: requirements-gui.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.name != 'gui-linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version || '3.12' }}
          cache: pip

      - name: Install Linux system dependencies (GUI only)
        if: runner.os == 'Linux' && contains(matrix.name, 'gui')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libsdl2-dev libxtst-dev python3-wxgtk4.0 python3-pip

      - name: Install build dependencies
        if: matrix.name != 'gui-linux'
        run: python -m pip install -r ${{ matrix.requirements }} pyinstaller

      - name: Install build dependencies (Linux GUI)
        if: matrix.name == 'gui-linux'
        run: |
          grep -v "Gooey" ${{ matrix.requirements }} > temp-requirements.txt
          python3 -m pip install -r temp-requirements.txt Pillow colored psutil pyinstaller
          python3 -m pip install --no-deps Gooey

      - name: Build executable
        if: matrix.name != 'gui-linux'
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Build executable (Linux GUI)
        if: matrix.name == 'gui-linux'
        run: python3 -m PyInstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Package zip
        shell: python
        run: |
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          name = "${{ matrix.name }}"
          executable = "${{ matrix.executable }}"
          archive = Path(f"pia-scrap-{name}.zip")
          files = [
              (Path("dist") / executable, executable),
              (Path("README.md"), "README.md"),
              (Path(".env.example"), ".env.example"),
          ]

          with ZipFile(archive, "w", ZIP_DEFLATED) as zip_file:
              for source, target in files:
                  zip_file.write(source, target)

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: pia-scrap-${{ matrix.name }}
          path: pia-scrap-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pia-scrap-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" pia-scrap-*.zip --generate-notes
